<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Detalle de Solicitud</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/styles.css">

</head>

<body>

<div class="detalle-container">

    <div class="revision-header">

        <div>

            <h1>Detalle de la Solicitud</h1>

            <p>

                Revise cuidadosamente la información antes de aprobar o rechazar la solicitud.

            </p>

        </div>

    </div>


    <div class="detalle-card">

        <h2>

            Información General

        </h2>

        <div id="informacionSolicitud">

        </div>

    </div>


    <div class="detalle-card">

        <h2>

            Documentos Adjuntos

        </h2>

        <div
            id="listaDocumentos"
            class="lista-documentos">

        </div>

    </div>


    <div class="detalle-card">

        <h2>

            Observaciones del Revisor

        </h2>

        <textarea

            id="observaciones"

            rows="7"

            placeholder="Ingrese aquí las observaciones técnicas de la revisión...">

        </textarea>

    </div>


    <div class="acciones">

        <button

            class="btn-aprobar"

            onclick="cambiarEstado('APROBADO')">

            ✔ Aprobar

        </button>

        <button

            class="btn-revision"

            onclick="cambiarEstado('EN_REVISION')">

            ✏ Solicitar Corrección

        </button>

        <button

            class="btn-rechazar"

            onclick="cambiarEstado('RECHAZADO')">

            ✖ Rechazar

        </button>

    </div>

</div>

<!-- VISOR PDF -->

<div id="modalPdf" class="modal-pdf">

    <div class="modal-contenido">

        <div class="modal-header">

            <h2>

                Documento

            </h2>

            <button onclick="cerrarPdf()">

                ✕

            </button>

        </div>

        <iframe

            id="visorPdf"

            src=""

            frameborder="0">

        </iframe>

    </div>

</div>


<script src="detalle_revision.js"></script>

</body>

</html>
